<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8f9fa;
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🥝</div>
        <h1>Welcome!</h1>
        <p>
            You have successfully arrived somewhere.
            That's already better than most GPS stories.
        </p>
        <p>
            Nothing to see here yet, but the future is looking promising.
        </p>
    </div>
</body>
</html>
